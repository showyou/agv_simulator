<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流通シミュレータ</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --accent: #0f3460;
      --text: #e0e0e0;
      --border: #2a2a4a;
      --ok: #4caf50;
      --ng: #f44336;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ヘッダー */
    header {
      background: var(--accent);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: bold; letter-spacing: 1px; }
    .ws-indicator { font-size: 11px; }
    .status-ok { color: var(--ok); }
    .status-ng { color: var(--ng); }

    /* メインレイアウト */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* 左: マップ */
    .map-area {
      flex: 1;
      overflow: auto;
      padding: 8px;
      background: #111122;
    }
    #map-canvas { display: block; background: #1a1a2e; }

    /* 右: サイドパネル */
    .sidebar {
      width: 280px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── 統計バー（常時表示、コンパクト） ── */
    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat-chip {
      flex: 1 1 33%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5px 2px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-chip:nth-child(3n) { border-right: none; }
    .stat-chip-label { font-size: 9px; color: #888; white-space: nowrap; }
    .stat-chip-value { font-size: 15px; font-weight: bold; }
    .chip-delivered .stat-chip-value { color: var(--ok); }
    .chip-pending   .stat-chip-value { color: #FFD700; }
    .chip-failed    .stat-chip-value { color: var(--ng); }
    .chip-tick      .stat-chip-value { color: #64b5f6; }
    .chip-charging  .stat-chip-value { color: #00BFFF; }
    .chip-dead      .stat-chip-value { color: #ff6b6b; }

    /* ── タブ ── */
    .tab-bar {
      display: flex;
      background: var(--accent);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 6px 0;
      font-size: 11px;
      font-weight: bold;
      background: transparent;
      color: #aaa;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active { background: var(--panel); color: #fff; }

    /* タブコンテンツ共通 */
    .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* ── 操作タブ ── */
    .tab-ops {
      overflow-y: auto;
      padding: 10px;
      gap: 8px;
      display: flex;
      flex-direction: column;
    }
    .btn-row { display: flex; gap: 5px; }
    button {
      flex: 1;
      padding: 6px 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    #btn-start { background: #2e7d32; color: #fff; }
    #btn-stop  { background: #b71c1c; color: #fff; }
    #btn-reset { background: #37474f; color: #fff; }
    #btn-order { background: #6a1b9a; color: #fff; }

    .section-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .slider-grid {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 4px 6px;
    }
    .slider-grid label { font-size: 11px; color: #aaa; white-space: nowrap; }
    .slider-grid input[type=range] { width: 100%; }
    .slider-grid span { font-size: 11px; text-align: right; width: 28px; }

    .seed-row { display: flex; gap: 4px; align-items: center; }
    .seed-row input[type=number] {
      flex: 1;
      background: #111;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 11px;
    }
    .seed-row button {
      flex: 0 0 auto;
      padding: 4px 10px;
      font-size: 11px;
      background: #37474f;
      color: #fff;
    }
    .seed-current { font-size: 10px; color: #888; margin-top: 2px; }
    .seed-current span { color: #64b5f6; font-family: monospace; }

    /* ── AGVタブ（バッテリー一覧） ── */
    .tab-agv {
      overflow-y: auto;
      padding: 8px 10px;
      flex: 1;
    }
    .agv-battery-list { display: flex; flex-direction: column; gap: 6px; }
    .agv-battery-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .agv-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .agv-battery-label { width: 58px; color: #bbb; white-space: nowrap; }
    .agv-battery-bar-bg {
      flex: 1; height: 8px;
      background: #2a2a4a; border-radius: 4px; overflow: hidden;
    }
    .agv-battery-bar {
      height: 100%; border-radius: 4px;
      transition: width 0.4s ease, background-color 0.4s ease;
    }
    .agv-battery-pct { width: 32px; text-align: right; color: #ccc; }

    /* ── ログ（常時・flex残余） ── */
    .log-section {
      flex-shrink: 0;
      height: 35%;
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      padding: 6px 8px;
      background: var(--panel);
    }
    .log-section h2 { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
    #log-panel {
      flex: 1;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.55;
      color: #ccc;
    }
    .log-entry { padding: 1px 0; border-bottom: 1px solid #1e1e3a; }
    .log-entry:nth-child(odd) { color: #9ec; }

    /* フッター */
    footer {
      background: var(--accent);
      padding: 3px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 10px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    footer span { color: #aaa; }
    footer strong { color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>流通シミュレータ</h1>
  <div class="ws-indicator">WS: <span id="ws-status" class="status-ng">切断</span></div>
</header>

<div class="main">
  <!-- 左: マップ -->
  <div class="map-area">
    <canvas id="map-canvas"></canvas>
  </div>

  <!-- 右: サイドパネル -->
  <div class="sidebar">

    <!-- 統計バー（常時） -->
    <div class="stats-bar">
      <div class="stat-chip chip-delivered">
        <span class="stat-chip-label">配送完了</span>
        <span class="stat-chip-value" id="stat-delivered">0</span>
      </div>
      <div class="stat-chip chip-pending">
        <span class="stat-chip-label">待機中</span>
        <span class="stat-chip-value" id="stat-pending">0</span>
      </div>
      <div class="stat-chip chip-failed">
        <span class="stat-chip-label">失敗</span>
        <span class="stat-chip-value" id="stat-failed">0</span>
      </div>
      <div class="stat-chip chip-tick">
        <span class="stat-chip-label">Tick</span>
        <span class="stat-chip-value" id="stat-tick">0</span>
      </div>
      <div class="stat-chip chip-charging">
        <span class="stat-chip-label">充電中</span>
        <span class="stat-chip-value" id="stat-charging">0</span>
      </div>
      <div class="stat-chip chip-dead" title="バッテリー0%到達は評価違反">
        <span class="stat-chip-label">⚠ 電池切れ</span>
        <span class="stat-chip-value" id="stat-battery-dead">0</span>
      </div>
    </div>

    <!-- タブバー -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="ops">操作・設定</button>
      <button class="tab-btn" data-tab="agv">AGV状態</button>
    </div>

    <!-- 操作タブ -->
    <div class="tab-content active" id="tab-ops">
      <div class="tab-ops">
        <div class="btn-row">
          <button id="btn-start">▶ 開始</button>
          <button id="btn-stop">■ 停止</button>
          <button id="btn-reset">↺ リセット</button>
        </div>
        <div class="btn-row">
          <button id="btn-order">＋ 注文追加</button>
        </div>

        <div>
          <div class="section-label">シミュレーション設定</div>
          <div class="slider-grid">
            <label>Tick速度(s)</label>
            <input type="range" id="sl-tick" min="0.1" max="2.0" step="0.1" value="0.5" />
            <span id="sl-tick-val">0.5</span>

            <label>注文間隔(tick)</label>
            <input type="range" id="sl-order" min="3" max="30" step="1" value="10" />
            <span id="sl-order-val">10</span>

            <label>AGV台数</label>
            <input type="range" id="sl-agvs" min="1" max="20" step="1" value="5" />
            <span id="sl-agvs-val">5</span>
          </div>
        </div>

        <div>
          <div class="section-label">シード</div>
          <div class="seed-row">
            <input type="number" id="seed-input" placeholder="自動" min="0" max="2147483647" />
            <button id="btn-reset-seed">適用</button>
          </div>
          <div class="seed-current">現在: <span id="current-seed">-</span></div>
        </div>
      </div>
    </div>

    <!-- AGVタブ -->
    <div class="tab-content" id="tab-agv">
      <div class="tab-agv">
        <div class="agv-battery-list" id="agv-battery-list"></div>
      </div>
    </div>

    <!-- ログ（常時） -->
    <div class="log-section">
      <h2>イベントログ</h2>
      <div id="log-panel"></div>
    </div>

  </div>
</div>

<footer>
  <span>商店 <strong style="color:#2E75B6;">■</strong></span>
  <span>倉庫 <strong style="color:#FF8C00;">■</strong></span>
  <span>顧客 <strong style="color:#70AD47;">●</strong></span>
  <span>AGV idle <strong style="color:#AAA;">▲</strong></span>
  <span>AGV moving <strong style="color:#FFD700;">▲</strong></span>
  <span>AGV delivering <strong style="color:#FF4444;">▲</strong></span>
  <span>AGV charging <strong style="color:#00BFFF;">▲</strong></span>
</footer>

<script src="/static/map.js"></script>
<script src="/static/ws.js"></script>
<script>
  // ---- タブ切り替え ----
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
    });
  });

  // ---- API ----
  async function api(method, path, body) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    return res.json();
  }

  // ---- ボタン ----
  document.getElementById("btn-start").addEventListener("click", () => api("POST", "/start"));
  document.getElementById("btn-stop").addEventListener("click", () => api("POST", "/stop"));

  async function doReset(seed) {
    const body = seed != null ? { seed } : {};
    const res = await api("POST", "/reset", body);
    document.getElementById("log-panel").innerHTML = "";
    lastLogTick = -1;
    prevDelivered = 0;
    if (res.seed != null) {
      document.getElementById("current-seed").textContent = res.seed;
      document.getElementById("seed-input").placeholder = res.seed;
    }
  }

  document.getElementById("btn-reset").addEventListener("click", () => doReset(null));
  document.getElementById("btn-reset-seed").addEventListener("click", () => {
    const val = document.getElementById("seed-input").value.trim();
    doReset(val !== "" ? parseInt(val) : null);
  });
  document.getElementById("btn-order").addEventListener("click", () => api("POST", "/order", {}));

  // ---- スライダー ----
  function sliderSetup(sliderId, valId, configKey, transform) {
    const sl = document.getElementById(sliderId);
    const valEl = document.getElementById(valId);
    sl.addEventListener("input", () => {
      valEl.textContent = sl.value;
      api("POST", "/config", { [configKey]: transform(sl.value) });
    });
  }
  sliderSetup("sl-tick",  "sl-tick-val",  "tick_interval",       parseFloat);
  sliderSetup("sl-order", "sl-order-val", "order_spawn_interval", parseInt);
  sliderSetup("sl-agvs",  "sl-agvs-val",  "num_agvs",            parseInt);

  // ---- アニメーションループ ----
  function animFrame() {
    if (latestState) renderMap(latestState);
    requestAnimationFrame(animFrame);
  }
  requestAnimationFrame(animFrame);
</script>
</body>
</html>
